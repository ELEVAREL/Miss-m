name: Deploy Miss M site to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - 'site/**'
      - 'install.sh'
      - '.github/workflows/pages.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Stage site
        run: |
          mkdir -p _site
          cp -r site/. _site/
          # Ensure the installer at /install.sh is always the repo-root version
          cp install.sh _site/install.sh
          chmod +x _site/install.sh
          # Disable Jekyll so filenames starting with _ are served as-is
          touch _site/.nojekyll

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
